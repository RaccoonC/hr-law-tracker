name: Daily HR Law Check

on:
  schedule:
    # 這裡設定的是 UTC 時間。UTC 00:00 相當於台灣時間早上 08:00
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip' # 加上快取，加快每次執行的速度

      # 👉 新增：安裝必要的 Python 套件
      - name: 安裝依賴套件
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 抓取法規異動
        run: python scripts/check_laws.py

      - name: 抓取新聞與草案動態
        run: python scripts/check_news.py

      - name: 提交異動（若有變化）
        env:
          TZ: Asia/Taipei # 👉 新增：設定為台灣時區，讓 commit 紀錄符合在地時間
        run: |
          git config user.name "hr-law-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/laws_status.json data/news_feed.json
          
          if git diff --cached --quiet; then
            echo "沒有資料變化，略過提交"
          else
            # 使用台灣時間標註 commit
            git commit -m "chore: 自動更新法規追蹤資料 $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
